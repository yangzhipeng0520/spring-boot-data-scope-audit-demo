server:
  port: 8081

spring:
  application:
    name: spring-boot-data-scope-audit-demo
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:data_scope_demo;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:mapper/**/*.xml

